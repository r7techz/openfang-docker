name: Build and Push OpenFang

on:
  workflow_dispatch:
    inputs:
      version_tag:
        description: 'Version tag (e.g. v2, v3)'
        required: true
        default: 'v2'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout OpenFang source
        uses: actions/checkout@v3
        with:
          repository: RightNow-AI/openfang

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          tags: |
            marsel7/openfang:latest
            marsel7/openfang:${{ github.event.inputs.version_tag }}
